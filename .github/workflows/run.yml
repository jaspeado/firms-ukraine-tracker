name: Actualizador automatico FIRMS

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Hugging Face Space Rebuild
        run: |
          curl -X POST "https://huggingface.co/api/spaces/Paspis/tracker-nasa/rebuild" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}"
