name: Descarga Automatica Cada 10 Minutos

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # SOLUCIÓN DE INFRAESTRUCTURA: Forzar el DNS de Google en el sistema operativo Linux de GitHub
      - name: Forzar DNS publico en Linux
        run: |
          sudo echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf > /dev/null
          sudo echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf > /dev/null

      - name: Instalar librerias basicas
        run: pip install pandas geopandas shapely

      - name: Ejecutar tu script de la NASA
        run: python tracker.py

      - name: Auto-subir Datos a GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "Sincronizacion automatica NASA" || exit 0
          git push origin main
