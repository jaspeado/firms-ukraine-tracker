name: Descarga Automatica Cada 10 Minutos

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerias basicas
        run: |
          pip install pandas geopandas shapely

      - name: Ejecutar tu script de la NASA
        run: python tracker.py

      - name: Auto-subir Datos a GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f "fires.geojson" ]; then
            git add fires.geojson
            git commit -m "Sincronizacion automatica NASA" || exit 0
            git push origin main
          else
            echo "Error critico: El archivo fires.geojson no se ha generado"
            exit 1
          fi
