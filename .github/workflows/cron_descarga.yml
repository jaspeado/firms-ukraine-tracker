name: Monitor Tactico Nube

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerias basicas
        run: pip install pandas geopandas shapely requests

      - name: Descargar datos de la NASA con CURL (Evita error IPv6)
        run: |
          curl -s -A "Mozilla/5.0" "https://firms.modaps.eosdis.nasa.gov/api/area/csv/c7b328641d071d4f5e429e28f3f1c07d/VIIRS_NOAA21_NRT/22,44,41,53/5" -o noaa21.csv
          curl -s -A "Mozilla/5.0" "https://firms.modaps.eosdis.nasa.gov/api/area/csv/c7b328641d071d4f5e429e28f3f1c07d/VIIRS_NOAA20_NRT/22,44,41,53/5" -o noaa20.csv
          curl -s -A "Mozilla/5.0" "https://firms.modaps.eosdis.nasa.gov/api/area/csv/c7b328641d071d4f5e429e28f3f1c07d/VIIRS_SNPP_NRT/22,44,41,53/5" -o snpp.csv

      - name: Crear script de Python para procesar los CSV
        run: |
          cat << 'EOF' > motor_tactico.py
          import os
          import sys
          import pandas as pd
          import geopandas as gpd
          from shapely.geometry import box
          import json

          FILES = ["noaa21.csv", "noaa20.csv", "snpp.csv"]
          OUT_GEOJSON = "fires.geojson"
          OUT_POLYGONS = "fires_polygons.geojson"
          UBI_FILE = "ubicacionesproyecto.geojson"

          def main():
              frames = []
              for f in FILES:
                  if os.path.exists(f) and os.path.getsize(f) > 50:
                      try:
                          df = pd.read_csv(f)
                          if not df.empty:
                              frames.append(df)
                      except Exception as e:
                          print(f"[ERROR] leyendo {f}: {e}")
                  
              if not frames:
                  print("\n[FIN] Cero detecciones en la consulta.")
                  sys.exit(0)
                  
              df_all = pd.concat(frames, ignore_index=True)
              df_all = df_all.drop_duplicates(subset=["latitude", "longitude", "acq_date", "acq_time", "satellite"])
              
              gdf_puntos = gpd.GeoDataFrame(
                  df_all, 
                  geometry=gpd.points_from_xy(df_all["longitude"], df_all["latitude"]), 
                  crs="EPSG:4326"
              )

              # --- ENRIQUECIMIENTO CON REGIONES ---
              if not os.path.exists(UBI_FILE):
                  print(f"[ALERTA] No se encontró {UBI_FILE}. Los datos irán sin región.")
                  gdf_puntos["NAME_1"] = ""
                  gdf_puntos["locality"] = ""
              else:
                  print(f"[INFO] Cargando ubicaciones desde {UBI_FILE}...")
                  gdf_ubi = gpd.read_file(UBI_FILE)
                  
                  if gdf_ubi.crs is None:
                      gdf_ubi.set_crs('EPSG:4326', inplace=True)
                  else:
                      gdf_ubi = gdf_ubi.to_crs('EPSG:4326')
                      
                  cols_to_keep = ['geometry', 'NAME_1', 'NAME_2']
                  cols_present = [c for c in cols_to_keep if c in gdf_ubi.columns]
                  gdf_ubi = gdf_ubi[cols_present]
                  
                  try:
                      gdf_join = gpd.sjoin(gdf_puntos, gdf_ubi, how='left', predicate='within')
                      if 'NAME_1' in gdf_join.columns:
                          gdf_join['NAME_1'] = gdf_join['NAME_1'].fillna('')
                      else:
                          gdf_join['NAME_1'] = ''
                          
                      if 'NAME_2' in gdf_join.columns:
                          gdf_join['locality'] = gdf_join['NAME_2'].fillna('')
                      else:
                          gdf_join['locality'] = ''
                  except Exception as e:
                      print(f"[ERROR] Falló el cruce espacial: {e}")
                      gdf_join = gdf_puntos.copy()
                      gdf_join['NAME_1'] = ''
                      gdf_join['locality'] = ''

              # --- GENERAR FIRES.GEOJSON ---
              features = []
              for _, row in gdf_join.iterrows():
                  features.append({
                      "type": "Feature",
                      "geometry": {"type": "Point", "coordinates": [row.geometry.x, row.geometry.y]},
                      "properties": {
                          "frp": float(row.get("frp", 0)),
                          "acq_date": str(row.get("acq_date", "")),
                          "acq_time": str(row.get("acq_time", "")),
                          "satellite": str(row.get("satellite", "")),
                          "brightness": row.get("brightness", None),
                          "NAME_1": row.get("NAME_1", ""),
                          "locality": row.get("locality", "")
                      }
                  })
              
              with open(OUT_GEOJSON, "w") as f:
                  json.dump({"type": "FeatureCollection", "features": features}, f, indent=2)
              print(f"\n[OK] Archivo '{OUT_GEOJSON}' generado. Total: {len(features)}")

              # --- GENERAR FIRES_POLYGONS.GEOJSON ---
              poly_features = []
              for feat in features:
                  lon, lat = feat["geometry"]["coordinates"]
                  size = 0.015
                  half = size / 2
                  poly = box(lon - half, lat - half, lon + half, lat + half)
                  poly_features.append({
                      "type": "Feature",
                      "geometry": {"type": "Polygon", "coordinates": [list(poly.exterior.coords)]},
                      "properties": feat["properties"]
                  })
              
              with open(OUT_POLYGONS, "w") as f:
                  json.dump({"type": "FeatureCollection", "features": poly_features}, f, indent=2)
              print(f"[OK] Archivo '{OUT_POLYGONS}' generado.")

          if __name__ == "__main__":
              main()
          EOF

      - name: Ejecutar script
        run: python motor_tactico.py

      - name: Auto-subir Datos a GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          git add fires.geojson fires_polygons.geojson
          git commit -m "Sincronizacion automatica NASA con regiones" || exit 0
          git push origin main
