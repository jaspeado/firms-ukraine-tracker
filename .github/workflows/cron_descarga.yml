name: Descarga Automatica Cada 10 Minutos

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # EL PARCHE REAL DE INGENIERÍA: Instala los drivers de mapas en el Linux de GitHub
      - name: Instalar dependencias del Sistema Operativo Linux (GDAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Instalar librerias de Cartografia en Python
        run: |
          pip install pandas geopandas fiona pyogrio shapely

      - name: Ejecutar script de la NASA
        run: python tracker.py

      - name: Auto-subir GeoPackage a GitHub (Con Seguro Anti-Errores)
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f "fires.gpkg" ]; then
            git add fires.gpkg
            git commit -m "Sincronizacion automatica NASA" || exit 0
            git push origin main
          else
            echo "Error critico: El script de Python no ha generado el archivo fires.gpkg"
            exit 1
          fi
